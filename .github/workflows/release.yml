name: Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    name: Cross-compile and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download dependencies
        run: go mod download

      - name: Build binaries
        run: |
          mkdir -p dist

          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o dist/gdrive-linux-amd64       .
          GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o dist/gdrive-linux-arm64       .
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o dist/gdrive-darwin-amd64      .
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o dist/gdrive-darwin-arm64      .
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/gdrive-windows-amd64.exe .

      - name: Generate release tag
        id: tag
        run: |
          TAG="v$(date +'%Y%m%d%H%M%S')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Release ${{ steps.tag.outputs.tag }}"
          body: |
            Automated release from commit ${{ github.sha }}

            ## Usage
            ```bash
            export GDRIVE_SA_KEY='<contents of your service account JSON>'
            ./gdrive -from /kaggle/working/runs/train -to "/drive/My Drive/PetCrib"
            ```
          files: |
            dist/gdrive-linux-amd64
            dist/gdrive-linux-arm64
            dist/gdrive-darwin-amd64
            dist/gdrive-darwin-arm64
            dist/gdrive-windows-amd64.exe
